[alembic]
script_location = alembic
prepend_sys_path = .
# Database URL — can be overridden by setting RTMEM_DATABASE_URL env var.
# See server/app/db/session.py for the effective URL resolution logic.
sqlalchemy.url = postgresql+asyncpg://rtmemory:secret@localhost:5432/rtmemory

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S